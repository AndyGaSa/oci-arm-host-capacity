name: Launch OCI ARM instance

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run script
        id: launch
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: ${{ secrets.OCI_PRIVATE_KEY_FILENAME }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          # OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
        run: |
          OUTPUT=$(php index.php)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Out of host capacity"; then
            echo "status=capacity" >> $GITHUB_OUTPUT
            echo "❌ Out of capacity — will retry"
            exit 1
          elif echo "$OUTPUT" | grep -q "NotAuthorizedOrNotFound"; then
            echo "status=auth_error" >> $GITHUB_OUTPUT
            echo "🔐 Auth error"
            exit 1
          elif echo "$OUTPUT" | grep -q "lifecycleState"; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ INSTANCE CREATED!"
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
            echo "$OUTPUT"
            exit 1
          fi

      - name: Notify Telegram on success
        if: steps.launch.outputs.status == 'success'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="🎉 Oracle ARM instance CREADA! Ve a Oracle Dashboard → Compute → Instances ahora y asigna la IP pública."

      - name: Notify Telegram on auth error
        if: steps.launch.outputs.status == 'auth_error'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="🔐 Error de autenticación en Oracle script. Revisa los secrets."
